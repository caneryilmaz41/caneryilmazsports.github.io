<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANER YILMAZ SPORTS</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .logo{
    
    height: 5px;;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background-image: url(images/back.jpg);
      background-size: cover;
      color: #fff;
    }
    .channel-buttons {
      margin-bottom: 20px;
    }
    .channel-button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      transition: all 0.3s ease; /* Hareket için geçiş efekti */
    }
    .channel-button:hover {
      background-color: #0056b3; /* Buton hover efekti */
    }
    .channel-button.active {
      background-color: #0056b3; /* Seçili kanal buton rengi */
    }
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .jumbotron {
      background-color: rgba(0, 0, 0, 0.5);
      padding: 40px;
      margin-bottom: 0;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="jumbotron text-center">
    
    <h1 class="display-4">CANER YILMAZ SPORTS</h1>
    <p class="lead">2023 yılında kurulan bu web sitesi CANER YILMAZ SPORTS, sizlerin en iyi şekilde canlı maç izlemesi için geliştirilmiştir.</p>
  </div>
  <div class="container mt-4">
    <div class="row">
      <div class="col-md-12 text-center">
        <div class="channel-buttons">
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvX0qxIoDmWD')">Bein Sports 1</button>
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvv82gi0dB3j')">Exxen</button>
          <!-- Add other channel buttons here -->
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvpEWx8FLRDU')">Bein Sports 2</button>
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvYXjDS4Kfbz')">Bein Sports 3</button>
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvE6TLbFMNzf')">S Sport 1</button>
          <button class="channel-button" onclick="changeChannel('player.livepush.io/emvUe1zHNfTeG')">Tivibu Spor 1</button>
        </div>
        <div class="video-container">
          <iframe id="videoPlayer" src="https://player.livepush.io/emvX0qxIoDmWD" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script>
    // Butonlara tıklandığında aktif butonu belirleme
    const buttons = document.querySelectorAll('.channel-button');

    buttons.forEach(button => {
      button.addEventListener('click', function() {
        buttons.forEach(btn => btn.classList.remove('active'));
        this.classList.add('active');
      });
    });

    // Function to change the channel of the video player
    function changeChannel(channelURL) {
      document.getElementById('videoPlayer').src = 'https://' + channelURL;
    }
    // Your existing JavaScript functions...
  </script>
</body>
</html>
